services:
  fraym:
    build: .
    ports:
      - "9977:9977"
    env_file:
      - .env
    environment:
      - PORT=9977
      - NODE_ENV=production
      - BGUTIL_BASE_URL=http://bgutil:4416
      - YTDLP_EXTRACTOR_ARGS=youtubepot-bgutilhttp:base_url=http://bgutil:4416
    volumes:
      - fraym_tmp:/app/tmp
      - fraym_outputs:/app/public/outputs
    depends_on:
      - bgutil
    restart: unless-stopped

  bgutil:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    init: true
    restart: unless-stopped

volumes:
  fraym_tmp:
  fraym_outputs:
